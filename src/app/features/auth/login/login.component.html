<div class="login-container">
  <!-- Background decorative elements -->
  <div class="bg-decoration">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="login-content">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-row">
        <img src="assets/icons/android-chrome-192x192.png" alt="SmartFix" class="logo-icon" />
        <div class="logo-text">
          <span class="logo-brand">SmartFix</span>
          <span class="logo-sub">Samana</span>
        </div>
      </div>
    </div>

    <!-- Welcome -->
    <h2 class="welcome-title">Bienvenido(a)</h2>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      @if (errorMessage) {
        <div class="error-message">
          <span class="error-icon">&#9888;</span>
          {{ errorMessage }}
        </div>
      }

      <div class="input-group">
        <input
          type="text"
          formControlName="username"
          class="form-input"
          placeholder="Correo electronico"
          [disabled]="isLoading"
          autocomplete="username"
        />
      </div>

      <div class="input-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          class="form-input"
          placeholder="Contrasena"
          [disabled]="isLoading"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="togglePasswordVisibility()"
          tabindex="-1"
          [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'">
          @if (showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          }
        </button>
      </div>

      <button
        type="submit"
        class="login-button"
        [disabled]="loginForm.invalid || isLoading">
        @if (isLoading) {
          <app-spinner
            size="small"
            color="white"
            [showMessage]="false">
          </app-spinner>
          Ingresando...
        } @else {
          Ingresar
        }
      </button>

      <div class="login-footer">
        <a routerLink="/register" class="forgot-link" [class.disabled]="isLoading">
          &#191;No tienes cuenta? Registrate aqui
        </a>
      </div>
    </form>
  </div>

  <!-- Copyright -->
  <p class="copyright">&copy; 2025 SmartFix. Todos los derechos reservados.</p>
</div>
